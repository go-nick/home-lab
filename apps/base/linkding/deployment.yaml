apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: linkding
  template:
    metadata:
      labels:
        app: linkding
    spec:
      securityContext:
        fsGroup: 33    # group ID
        runAsUser: 33  # user ID
        runAsGroup: 33 # group ID
      containers:
        - name: linkding
          image: sissbruecker/linkding:1.31.0
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: linkding-volume
              mountPath: /etc/linkding/data
          ports:
            - containerPort: 9090
      volumes:
        - name: linkding-volume
          persistentVolumeClaim:
            claimName: linkding-pvc
