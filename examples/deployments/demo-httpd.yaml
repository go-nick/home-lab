apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: demo-httpd
  name: demo-httpd
  namespace: demo
spec:
  replicas: 10
  selector:
    matchLabels:
      app: demo-httpd
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: demo-httpd
    spec:
      containers:
      - image: httpd:alpine3.18
        name: httpd
